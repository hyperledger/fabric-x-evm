# Test configuration for integration tests against a Fabric-X test network.
# Paths are relative to the integration/ package directory (where go test runs).

network:
  protocol: fabric-x
  channel: mychannel
  namespace: basic
  ns-version: "1.0"
  chain-id: 4011

gateway:
  listen: "0.0.0.0:8545"

  identity:
    msp-id: Org1MSP
    msp-dir: ../testdata/crypto/peerOrganizations/Org1/users/User1@org1.example.com/msp

  database:
    connection-string: "file:gateway.db?mode=memory&cache=shared"
    trie-path: ""

  orderers:
    - endpoint:
        host: 127.0.0.1
        port: 7050
      tls:
        mode: mtls
        cert-path: ../testdata/crypto/peerOrganizations/Org1/users/User1@org1.example.com/tls/client.crt
        key-path: ../testdata/crypto/peerOrganizations/Org1/users/User1@org1.example.com/tls/client.key
        ca-cert-paths:
          - ../testdata/crypto/peerOrganizations/Org1/peers/committer.org1.example.com/tls/ca.crt

  committer:
    endpoint:
      host: 127.0.0.1
      port: 4001
    tls:
      mode: mtls
      cert-path: ../testdata/crypto/peerOrganizations/Org1/users/User1@org1.example.com/tls/client.crt
      key-path: ../testdata/crypto/peerOrganizations/Org1/users/User1@org1.example.com/tls/client.key
      ca-cert-paths:
        - ../testdata/crypto/peerOrganizations/Org1/peers/committer.org1.example.com/tls/ca.crt

endorsers:
  - name: org1
    identity:
      msp-id: Org1MSP
      msp-dir: ../testdata/crypto/peerOrganizations/Org1/peers/endorser.org1.example.com/msp
    committer:
      endpoint:
        host: 127.0.0.1
        port: 4001
      tls:
        mode: mtls
        cert-path: ../testdata/crypto/peerOrganizations/Org1/users/User1@org1.example.com/tls/client.crt
        key-path: ../testdata/crypto/peerOrganizations/Org1/users/User1@org1.example.com/tls/client.key
        ca-cert-paths:
          - ../testdata/crypto/peerOrganizations/Org1/peers/committer.org1.example.com/tls/ca.crt
    database:
      connection-string: "file:endorser-org1.db?mode=memory&cache=shared"
